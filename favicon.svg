<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2725b"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <!-- Frame -->
  <rect x="3" y="3" width="26" height="26" rx="5.5" fill="none" stroke="url(#fg)" stroke-width="1.5"/>
  <!-- Fe -->
  <text x="16" y="21.5" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15" font-weight="700" fill="url(#fg)">Fe</text>
  <!-- 26 -->
  <text x="7.5" y="10.5" font-family="sans-serif"
        font-size="5" font-weight="600" fill="#6b6b7a">26</text>
